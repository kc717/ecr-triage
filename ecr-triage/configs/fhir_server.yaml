# Local Docker HAPI FHIR (primary — run with docker-compose)
servers:
  local_hapi:
    base_url: "http://localhost:8080/fhir"
    auth: none
    description: "HAPI FHIR R4 running locally via Docker"

  # Fallback: public test server (for reference only)
  hapi_r4:
    base_url: "https://hapi.fhir.org/baseR4"
    auth: none
    description: "HAPI FHIR R4 public test server (fallback)"

  firely_r4:
    base_url: "https://server.fire.ly/r4"
    auth: none
    description: "Firely R4 public test server"

# Default server for development
default_server: local_hapi

# Resource types we read from eICR Bundles
ecr_resources:
  - Bundle
  - Patient
  - Condition
  - Encounter
  - Observation
  - Immunization
  - Organization

# Resource types we write back
writeback_resources:
  - Flag
  - Task

# Triage priority levels
priority_levels:
  - code: "urgent"
    display: "Urgent"
    description: "Immediate investigation required"
  - code: "high"
    display: "High"
    description: "Investigation within 24 hours"
  - code: "routine"
    display: "Routine"
    description: "Standard processing timeline"
  - code: "low"
    display: "Low"
    description: "Batch processing acceptable"
